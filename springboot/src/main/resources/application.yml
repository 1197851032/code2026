server:
  port: 9090
  tomcat:
    uri-encoding: UTF-8

# 数据库配置
spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: zxh20040306
    url: jdbc:mysql://localhost:3306/code2026?useUnicode=true&characterEncoding=utf-8&allowMultiQueries=true&useSSL=false&serverTimezone=GMT%2b8&allowPublicKeyRetrieval=true
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
  # Redis配置
  data:
    redis:
      host: localhost
      port: 6379
      password: 
      database: 0
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms
  # Redis缓存配置
  cache:
    type: redis
    redis:
      time-to-live: 600000  # 10分钟，单位毫秒

# 配置mybatis实体和xml映射
mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true

fileBaseUrl: http://localhost:9090

# OpenAI配置
openai:
  api:
    key: YOUR_API_KEY  # 替换为你的OpenAI API Key
    base-url: https://api.openai.com/v1
  model:
    name: gpt-3.5-turbo

langchain4j:
  openai:
    chat-model:
      api-key: YOUR_API_KEY
      model-name: gpt-3.5-turbo
      temperature: 0.7

# JWT配置
jwt:
  secret: mySecretKey123456789012345678901234567890
  expiration: 86400  # 24小时，单位秒